<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ArenaX API Docs</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    body { margin: 0; background: #0f0f0f; }
    .swagger-ui .topbar { background: #1a1a2e; }
    .swagger-ui .topbar .download-url-wrapper { display: none; }
    #custom-header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #0f3460;
    }
    #custom-header h1 { margin: 0; font-size: 1.6rem; color: #e94560; font-family: sans-serif; }
    #custom-header span { color: #a0a0b0; font-family: sans-serif; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div id="custom-header">
    <div>
      <h1>⚔️ ArenaX API</h1>
      <span>Competitive gaming platform — REST + WebSocket reference</span>
    </div>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    SwaggerUIBundle({
      url: "./openapi.yaml",
      dom_id: "#swagger-ui",
      presets: [SwaggerUIBundle.presets.apis, SwaggerUIBundle.SwaggerUIStandalonePreset],
      layout: "BaseLayout",
      deepLinking: true,
      displayRequestDuration: true,
      filter: true,
      tryItOutEnabled: true,
      persistAuthorization: true,
    });
  </script>
</body>
</html>
