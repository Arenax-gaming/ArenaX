name: CI

on:
  push:
    branches: [ main, dev, develop ]
  pull_request:
    branches: [ main, dev, develop ]

jobs:
  # Frontend CI
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for Chromatic
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    
    - name: Lint code
      run: npm run lint
    
    - name: Build
      run: npm run build
    
    - name: Run Unit & Component Tests
      run: npm test -- --coverage
    
    - name: Check Coverage Thresholds
      run: |
        # Jest will exit with non-zero if thresholds are not met
        npm test -- --coverage --coverageThreshold='{"global":{"branches":85,"functions":85,"lines":85,"statements":85}}'
    
    - name: Run E2E Tests
      run: npx playwright test
    
    - name: Run Lighthouse CI
      run: npx lhci autoreview
      env:
        LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
    
    - name: Run Chromatic
      run: npx chromatic --project-token=${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  # Server (TypeScript) CI
  server:
    name: Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Generate Prisma Client
      run: npm run prisma:generate
    
    - name: Type check (Lint)
      run: npm run lint
    
    - name: Build
      run: npm run build

  # Contracts CI (Rust)
  contracts:
    name: Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./contracts
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    
    - name: Install wasm target
      run: rustup target add wasm32-unknown-unknown
    
    - name: Cache cargo
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          contracts/target
        key: ${{ runner.os }}-cargo-contracts-${{ hashFiles('contracts/Cargo.lock') }}
    
    - name: Check formatting
      run: cargo fmt --all -- --check
    
    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
    
    - name: Build contracts
      run: cargo build --target wasm32-unknown-unknown --release
    
    - name: Run tests
      run: cargo test

  # Security scan
