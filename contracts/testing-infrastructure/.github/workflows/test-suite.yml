name: ArenaX Contract Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run nightly security scans at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run unit tests
        run: |
          cd contracts
          cargo test --workspace --lib
      
      - name: Check test coverage threshold
        run: |
          echo "Verifying test coverage meets 95% threshold..."
          # Coverage check will be added after tarpaulin setup

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Run integration tests
        run: |
          cd contracts/testing-infrastructure
          cargo test --test integration_tests

  fuzz-tests:
    name: Property-Based Fuzzing Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Run fuzz tests
        run: |
          cd contracts/testing-infrastructure
          cargo test --test fuzz_tests
        timeout-minutes: 30

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Install security tools
        run: |
          cargo install cargo-audit
          cargo install cargo-geiger
      
      - name: Run cargo audit
        run: |
          cd contracts
          cargo audit
      
      - name: Run cargo geiger
        run: |
          cd contracts
          cargo geiger
      
      - name: Run custom security checks
        run: |
          cd contracts/testing-infrastructure/security
          ./scan.sh
      
      - name: Upload security report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-report
          path: contracts/testing-infrastructure/security/reports/

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Generate coverage report
        run: |
          cd contracts
          cargo tarpaulin --workspace --out Html --output-dir ../testing-infrastructure/coverage/reports
      
      - name: Check coverage threshold
        run: |
          cd contracts
          COVERAGE=$(cargo tarpaulin --workspace --out Json | jq '.coverage')
          echo "Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 95" | bc -l) )); then
            echo "❌ Coverage $COVERAGE% is below 95% threshold"
            exit 1
          fi
          echo "✅ Coverage $COVERAGE% meets 95% threshold"
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: contracts/testing-infrastructure/coverage/reports/

  benchmarks:
    name: Gas Optimization Benchmarks
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Run benchmarks
        run: |
          cd contracts/testing-infrastructure
          cargo bench --bench gas_benchmarks
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        with:
          name: benchmark-results
          path: contracts/testing-infrastructure/target/criterion/

  economic-simulation:
    name: Economic Simulation Tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
      
      - name: Run economic simulations
        run: |
          cd contracts/testing-infrastructure
          cargo test --test economic_simulation
        timeout-minutes: 60

  lint:
    name: Linting and Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          components: rustfmt, clippy
          override: true
      
      - name: Run rustfmt
        run: |
          cd contracts
          cargo fmt -- --check
      
      - name: Run clippy
        run: |
          cd contracts
          cargo clippy --all-targets --all-features -- -D warnings

  build:
    name: Build Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          target: wasm32-unknown-unknown
          override: true
      
      - name: Build all contracts
        run: |
          cd contracts
          cargo build --release --target wasm32-unknown-unknown
      
      - name: Verify WASM output
        run: |
          cd contracts
          ls -lh target/wasm32-unknown-unknown/release/*.wasm

  audit-report:
    name: Generate Audit Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan, coverage, benchmarks]
    if: always()
    steps:
      - uses: actions/checkout@v3
      
      - name: Download all artifacts
        uses: actions/download-artifact@v3
      
      - name: Generate comprehensive audit report
        run: |
          cd contracts/testing-infrastructure
          ./scripts/generate_audit_report.sh
      
      - name: Upload audit report
        uses: actions/upload-artifact@v3
        with:
          name: comprehensive-audit-report
          path: contracts/testing-infrastructure/reports/audit_report.md

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, security-scan, coverage, benchmarks]
    if: failure()
    steps:
      - name: Send notification
        run: |
          echo "❌ Test suite failed! Check the logs for details."
          # Add Slack/Discord/Email notification here
